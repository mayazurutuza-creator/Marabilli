<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontaktuak Marabilli</title>
    <link rel="icon" type="image/png" href="marabilli_img/punteroa.png">
    <link rel="stylesheet" href="marabilli_css/fonts.css">
    <link rel="stylesheet" href="marabilli_css/kontaktuak.css">
    <link rel="stylesheet" href="../marabilli/marabilli_css/reset.css">
    <link rel="stylesheet" href="marabilli_css/navegador.css">
</head>
<body>

    <nav class="nabigazio-finkoa">
        <div class="logo-marka">MARABILLI</div>
        <button class="hamburguesa" id="btn-hamburguesa" aria-label="Menua ireki">
            <span></span><span></span><span></span>
        </button>
        <ul class="menua" id="menu-lista">
            <li><a href="index.html">HASIERA</a></li>
            <li><a href="partaideak.html">PARTAIDEAK</a></li>
            <li><a href="shop.html">DENDA</a></li>
            <li><a href="kontaktuak.html">KONTAKTUAK</a></li>
        </ul>
    </nav>
    <div class="menu-overlay" id="overlay"></div>

    <main class="kontaktu-nagusia" style="padding-top: 120px;">
        <div class="kontaktu-flex-container">
            <div class="info-zutabea">
                <h1 class="izenburu-handia">KONTAKTUA</h1>
                <p class="testu-laguntzailea">Sormenari buruzko zalantzarik? Proposamenen bat daukazu? Idatziguzu eta hitz egingo dugu.</p>
                <div class="xehetasun-zerrenda">
                    <div class="info-item"><span>EMAIL</span><p>info@marabillifestibala.eus</p></div>
                    <div class="info-item"><span>LEKUA</span><p>Ondarroa, Bizkaia</p></div>
                    <div class="info-item"><span>SAREAK</span><p>@marabillifestibala</p></div>
                </div>
            </div>

            <div class="form-zutabea">
                <div class="form-txartela">
                    <form id="kontaktu-form" action="https://formspree.io/f/meergpow" method="POST">
                        <div class="input-taldea">
                            <label for="izena">IZEN-ABIZENAK</label>
                            <input type="text" id="izena" name="izena" placeholder="Zure izena..." required>
                        </div>
                        <div class="input-taldea">
                            <label for="email">POSTA ELEKTRONIKOA</label>
                            <input type="email" id="email" name="email" placeholder="email@adibidea.com" required>
                        </div>
                        <div class="input-taldea">
                            <label for="mezua">MEZUA</label>
                            <textarea id="mezua" name="mezua" rows="5" placeholder="Idatzi hemen zure mezua..." required></textarea>
                        </div>
                        <button type="submit" class="botoi-marabilli" id="submit-btn">BIDALI MEZUA</button>
                        <div id="feedback-mezua"></div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="marabilli.js/menu.js"></script>
    <script>
        const form = document.getElementById('kontaktu-form');
        const feedback = document.getElementById('feedback-mezua');
        const btn = document.getElementById('submit-btn');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            btn.innerText = "BIDALTZEN...";
            btn.disabled = true;
            const formData = new FormData(form);
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });
                if (response.ok) {
                    feedback.innerText = "ESKERRIK ASKO!";
                    feedback.className = "success-msg";
                    feedback.style.display = "block";
                    btn.innerText = "BIDALITA";
                    form.reset();
                } else { throw new Error(); }
            } catch (error) {
                feedback.innerText = "Errorea gertatu da.";
                feedback.style.display = "block";
                btn.disabled = false;
                btn.innerText = "BIDALI MEZUA";
            }
        });
    </script>
    
</body>
</html>
